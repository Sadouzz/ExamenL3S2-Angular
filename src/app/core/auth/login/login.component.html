<div class="login-container">
      <div class="card login-card animate-fade-in">
        <div class="text-center mb-4">
          <div class="logo mb-2">
            <i class="fas fa-wallet"></i>
          </div>
          <h2>BadWallet</h2>
          <p class="text-muted mt-1">Sélectionnez votre profil pour continuer</p>
        </div>
        
        <div class="form-group mt-4">
          <label class="form-label">Numéro de téléphone (Espace Client)</label>
          <input type="text" class="form-control" [(ngModel)]="phone" placeholder="Ex: 771234567" (keyup.enter)="loginAsClient()">
        </div>
        
        <button class="btn btn-primary w-100" (click)="loginAsClient()" [disabled]="!phone">
          <i class="fas fa-sign-in-alt"></i> Se connecter (Client)
        </button>
        
        <div class="divider my-4">
          <span>OU</span>
        </div>
        
        <button class="btn btn-outline w-100 agent-btn" (click)="loginAsAgent()">
          <i class="fas fa-user-shield"></i> Accès Agent de Guichet
        </button>
      </div>
    </div>
