<div class="modal-overlay">
      <div class="modal-content card animate-fade-in">
        <div class="d-flex justify-content-between align-items-center mb-4">
          <h3 class="mb-0">Nouveau Portefeuille</h3>
          <button class="btn btn-outline" style="border:none; padding: 0.5rem" (click)="close.emit()">
            <i class="fas fa-times m-0"></i>
          </button>
        </div>
        <form [formGroup]="form" (ngSubmit)="submit()">
          <div class="form-group">
            <label class="form-label">Email du client</label>
            <input type="email" class="form-control" formControlName="email" placeholder="Email">
          </div>
          <div class="form-group">
            <label class="form-label">Téléphone</label>
            <input type="text" class="form-control" formControlName="phoneNumber" placeholder="Ex: 771234567">
          </div>
          <button type="submit" class="btn btn-primary w-100" [disabled]="form.invalid">Créer</button>
        </form>
      </div>
    </div>
