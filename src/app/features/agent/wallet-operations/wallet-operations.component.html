<div class="modal-overlay">
      <div class="modal-content card animate-fade-in">
        <div class="d-flex justify-content-between align-items-center mb-4">
          <h3 class="mb-0">Opérations</h3>
          <button class="btn btn-outline" style="border:none; padding: 0.5rem" (click)="close.emit()">
            <i class="fas fa-times m-0"></i>
          </button>
        </div>
        
        <p class="text-muted mb-4">Client: <strong>{{ wallet.email }}</strong> ({{ wallet.phoneNumber }})</p>

        <div class="d-flex gap-2 mb-4">
          <button class="btn flex-1" [ngClass]="type === 'DEPOSIT' ? 'btn-primary' : 'btn-outline'" (click)="type = 'DEPOSIT'">
            <i class="fas fa-arrow-down"></i> Dépôt
          </button>
          <button class="btn flex-1" [ngClass]="type === 'WITHDRAW' ? 'btn-danger' : 'btn-outline'" (click)="type = 'WITHDRAW'">
            <i class="fas fa-arrow-up"></i> Retrait
          </button>
        </div>

        <div class="form-group">
          <label class="form-label">Montant (XOF)</label>
          <input type="number" class="form-control" [(ngModel)]="amount" placeholder="0">
        </div>

        <button class="btn w-100" [ngClass]="type === 'DEPOSIT' ? 'btn-primary' : 'btn-danger'" 
          (click)="submit()" [disabled]="!amount || amount <= 0">
          Valider le {{ type === 'DEPOSIT' ? 'Dépôt' : 'Retrait' }}
        </button>
      </div>
    </div>
